name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues configuration
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. 
            It will be closed in 14 days if no further activity occurs.

            If this issue is still relevant, please comment to keep it open.
            Thank you for your contributions!
          close-issue-message: |
            This issue was automatically closed due to inactivity.

            If you believe this issue is still relevant, feel free to reopen it or create a new issue with updated information.
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,good first issue,help wanted'

          # Pull Requests configuration
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 7 days if no further activity occurs.

            If you're still working on this, please push an update or leave a comment.
            Thank you for your contribution!
          close-pr-message: |
            This pull request was automatically closed due to inactivity.

            If you'd like to continue this work, feel free to reopen this PR or submit a new one.
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work-in-progress,blocked'

          # General configuration
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: false
